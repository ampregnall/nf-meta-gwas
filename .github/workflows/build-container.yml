name: Build and publish container

on:
  push:
    branches:
      - main
    paths:
      - 'containers/gwaslab/**'
      - 'containers/meta-analysis/**'
      - 'containers/magma/**'
      - 'containers/pops/**'
    tags:
      - 'gwaslab-v*'
      - 'meta-analysis-v*'
      - 'magma-v*'
      - 'pops-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v0.3.0, default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gwaslab:
    name: gwaslab container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gwaslab
          tags: |
            type=match,pattern=gwaslab-v(.*),group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/gwaslab-v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          context: containers/gwaslab
          file: containers/gwaslab/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  meta-analysis:
    name: meta-analysis container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
