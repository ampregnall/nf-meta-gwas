name: Build and publish container

on:
  push:
    tags:
      - 'munge-sumstats-v*'
      - 'gwaslab-v*'
  workflow_dispatch:
    inputs:
      container:
        description: 'Container to build'
        required: true
        type: choice
        options:
          - munge-sumstats
          - gwaslab
      tag:
        description: 'Image tag (e.g. munge-sumstats-v0.1.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  munge-sumstats:
    name: MungeSumstats container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/munge-sumstats-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.container == 'munge-sumstats')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ steps.tag.outputs.value }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/munge_sumstats.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  gwaslab:
    name: gwaslab container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/gwaslab-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.container == 'gwaslab')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ steps.tag.outputs.value }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
