name: Build and publish container

on:
  push:
    branches:
      - main
    paths:
      - 'containers/munge_sumstats.Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. munge-sumstats-v0.1.0)'
        required: true
        default: 'munge-sumstats-v0.1.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'munge-sumstats-v0.1.0' }}
            type=sha,prefix=munge-sumstats-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/munge_sumstats.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
