name: Build and publish container

on:
  push:
    branches:
      - main
    paths:
      - 'containers/munge_sumstats.Dockerfile'
      - 'containers/Dockerfile'
      - 'containers/environment.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  munge-sumstats:
    name: MungeSumstats container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'containers/munge_sumstats.Dockerfile')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=munge-sumstats-v0.1.0
            type=sha,prefix=munge-sumstats-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/munge_sumstats.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  gwaslab:
    name: gwaslab container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'containers/Dockerfile') ||
      contains(github.event.head_commit.modified, 'containers/environment.yml')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=gwaslab-v0.2.0
            type=sha,prefix=gwaslab-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
